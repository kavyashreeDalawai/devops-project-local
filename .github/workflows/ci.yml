name: CI Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Python Runtime Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pynose coverage flake8 click factory-boy python-dotenv

    - name: Run Code Linter Syntax Guard (Flake8)
      run: |
        # Removed the broken --stats argument
        flake8 . --count --select=E9,F63,F7,F82 --show-source
        flake8 . --count --max-line-length=127 --statistics

    - name: Execute Automated Test Suite & Coverage Checks
      env:
        DATABASE_URI: postgresql://postgres:postgres@localhost:5432/postgres
        FLASK_APP: service:create_app
        SECRET_KEY: github-actions-secret-key
      run: |
        pynose
